<header [class.scrolled]="scrolled()">
  <div class="container bar">
    <a routerLink="/" class="brand" (click)="closeMenu()">
      <img src="images/logo.png" alt="GEN Z Foods" />
    </a>

    <nav class="nav" [class.open]="mobileMenuOpen()">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Home</a>
      <a routerLink="/menu" routerLinkActive="active" (click)="closeMenu()">Menu</a>
      <a routerLink="/menu" fragment="deals" (click)="closeMenu()">Deals</a>

      <div class="nav-cta">
        @if (isAuthenticated()) {
          <span class="hello">Hi, {{ user()?.name }}</span>
          <button class="btn btn-ghost btn-sm" (click)="logout()">Logout</button>
        } @else {
          <a routerLink="/login" class="btn btn-ghost btn-sm" (click)="closeMenu()">Login</a>
        }
      </div>
    </nav>

    <div class="actions">
      <a routerLink="/cart" class="cart-btn" aria-label="Cart" (click)="closeMenu()">
        <span class="cart-ico">🛒</span>
        @if (cartCount() > 0) { <span class="cart-badge">{{ cartCount() }}</span> }
      </a>
      <button class="burger" [class.open]="mobileMenuOpen()" (click)="toggleMenu()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>
